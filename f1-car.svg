<svg xmlns="http://www.w3.org/2000/svg" width="800" height="100" viewBox="0 0 800 100">
  <defs>
    <style>
      .car { animation: drive 4s linear infinite; }
      .trail { animation: drive 4s linear infinite; animation-delay: -0.08s; }
      .wheel { animation: spin 0.18s linear infinite; transform-box: fill-box; transform-origin: center; }
      .puff { animation: puff 0.4s ease-out infinite; transform-origin: 0% 50%; }
      .drs { animation: drsGlow 0.9s ease-in-out infinite; }
      @keyframes drive {
        0%   { transform: translateX(-100px); opacity: 1; }
        80%  { transform: translateX(820px); opacity: 1; }
        80.1%{ opacity: 0; transform: translateX(820px); }
        80.2%{ opacity: 0; transform: translateX(-100px); }
        80.3%{ opacity: 1; transform: translateX(-100px); }
        100% { transform: translateX(820px); opacity: 1; }
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @keyframes puff {
        0%   { transform: scaleX(1); opacity: 0.85; }
        100% { transform: scaleX(4); opacity: 0; }
      }
      @keyframes drsGlow {
        0%,100% { opacity: 0.5; }
        50%     { opacity: 1; }
      }
    </style>
  </defs>

  <!-- Track background -->
  <rect width="800" height="100" fill="#0a0a0f"/>

  <!-- Red kerb strips -->
  <rect x="0" y="22" width="800" height="5" fill="#E8002D"/>
  <rect x="0" y="73" width="800" height="5" fill="#E8002D"/>

  <!-- Asphalt -->
  <rect x="0" y="27" width="800" height="46" fill="#111118"/>

  <!-- Dashed centre line -->
  <line x1="0" y1="50" x2="800" y2="50" stroke="#ffffff" stroke-width="1.2" stroke-dasharray="22 20" opacity="0.1"/>

  <!-- Speed trail -->
  <g class="trail">
    <rect x="-30" y="47" width="22" height="2" fill="#00d2ff" rx="1" opacity="0.5"/>
    <rect x="-34" y="51" width="15" height="1.5" fill="#3a7bd5" rx="1" opacity="0.35"/>
  </g>

  <!-- F1 Car -->
  <g class="car">
    <!-- Exhaust puff -->
    <rect class="puff" x="-10" y="47" width="10" height="6" fill="#ff7043" rx="2"/>

    <!-- Rear wing upper flap -->
    <rect x="-6" y="37" width="14" height="2" rx="0.5" fill="#cc0011"/>
    <!-- Rear wing DRS glow -->
    <rect class="drs" x="-5" y="39.5" width="12" height="1" rx="0.5" fill="#00d2ff"/>
    <!-- Rear wing lower -->
    <rect x="-4" y="41" width="10" height="3" rx="0.5" fill="#E8002D"/>

    <!-- Rear wheel left -->
    <circle class="wheel" cx="4" cy="57" r="6" fill="#0d0d0d"/>
    <circle cx="4" cy="57" r="6" fill="none" stroke="#444" stroke-width="1.2"/>
    <circle cx="4" cy="57" r="2.2" fill="#222"/>
    <!-- Rear wheel right -->
    <circle class="wheel" cx="4" cy="43" r="6" fill="#0d0d0d"/>
    <circle cx="4" cy="43" r="6" fill="none" stroke="#444" stroke-width="1.2"/>
    <circle cx="4" cy="43" r="2.2" fill="#222"/>

    <!-- Main body (side pods) -->
    <rect x="0" y="44" width="56" height="12" rx="3" fill="#0d1117"/>
    <!-- Body top surface -->
    <rect x="4" y="42" width="48" height="16" rx="3" fill="#E8002D"/>
    <!-- Side pod detail left -->
    <rect x="6" y="46" width="12" height="8" rx="1.5" fill="#cc0011"/>
    <!-- Side pod detail right -->
    <rect x="38" y="46" width="12" height="8" rx="1.5" fill="#cc0011"/>
    <!-- Chassis floor -->
    <rect x="2" y="52" width="54" height="4" rx="1" fill="#1a0005"/>

    <!-- Engine cover / airbox -->
    <rect x="16" y="39" width="22" height="6" rx="2" fill="#cc0011"/>
    <rect x="18" y="38" width="18" height="4" rx="1.5" fill="#b00010"/>

    <!-- Halo -->
    <path d="M18 45 Q27 37 36 45" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round"/>
    <rect x="26" y="37" width="2" height="7" rx="1" fill="#888"/>

    <!-- Cockpit -->
    <rect x="18" y="40" width="20" height="10" rx="2" fill="#0a0a1a"/>
    <rect x="19" y="41" width="18" height="7" rx="1.5" fill="#003399" opacity="0.9"/>
    <!-- Visor highlight -->
    <rect x="19" y="41" width="5" height="7" rx="1" fill="#ffffff" opacity="0.12"/>

    <!-- Nose cone -->
    <path d="M52 46 L70 49.5 L52 53 Z" fill="#E8002D"/>
    <path d="M60 49.5 L70 49.5" stroke="#cc0011" stroke-width="1.5" fill="none"/>

    <!-- Front wing main -->
    <rect x="62" y="46" width="18" height="2.5" rx="0.5" fill="#cc0011"/>
    <rect x="65" y="43.5" width="14" height="2" rx="0.5" fill="#E8002D"/>
    <!-- Front wing endplates -->
    <rect x="62" y="43.5" width="2" height="8" rx="0.5" fill="#b00010"/>
    <rect x="78" y="43.5" width="2" height="8" rx="0.5" fill="#b00010"/>

    <!-- Front wheel left -->
    <circle class="wheel" cx="70" cy="57" r="5.5" fill="#0d0d0d"/>
    <circle cx="70" cy="57" r="5.5" fill="none" stroke="#444" stroke-width="1.2"/>
    <circle cx="70" cy="57" r="2" fill="#222"/>
    <!-- Front wheel right -->
    <circle class="wheel" cx="70" cy="43" r="5.5" fill="#0d0d0d"/>
    <circle cx="70" cy="43" r="5.5" fill="none" stroke="#444" stroke-width="1.2"/>
    <circle cx="70" cy="43" r="2" fill="#222"/>

    <!-- Car number -->
    <text x="29" y="53" font-family="Arial Black, sans-serif" font-size="7" fill="white" font-weight="900" text-anchor="middle">23</text>

    <!-- Headlight -->
    <rect x="68" y="47" width="4" height="4" rx="0.5" fill="#ffee44" opacity="0.95"/>
  </g>

  <!-- DRS ACTIVE label -->
  <text x="788" y="19" font-family="Courier New, monospace" font-size="9" fill="#00d2ff" text-anchor="end" opacity="0.6">DRS ACTIVE</text>
  <!-- LAP label -->
  <text x="12" y="19" font-family="Courier New, monospace" font-size="9" fill="#E8002D" opacity="0.6">LAP 1</text>
</svg>
